name: NewsBot_RPA_Multichannel

on:
  schedule:
    # Se ejecuta cada hora (minuto 0)
    - cron: '0 */4 * * *'
  # Habilita la ejecución manual desde la interfaz de GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Optar por Node 24 ahora para evitar las advertencias de deprecación
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 # Actualizado de v3 a v4

      - name: Configurar Python
        uses: actions/setup-python@v5 # Actualizado de v4 a v5
        with:
          python-version: '3.10'
          cache: 'pip' # Mantiene la instalación de dependencias rápida

      - name: Instalar dependencias
        run: |
          pip install feedparser requests beautifulsoup4 python-telegram-bot supabase

      - name: Ejecutar Bot Multicanal
        env:
          # Conexión Supabase (Nuevos Secrets)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          
          # Telegram y Canales
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CH_DEPORTES: ${{ secrets.CH_DEPORTES }}
          CH_ENTRETENIMIENTO: ${{ secrets.CH_ENTRETENIMIENTO }}
          CH_MUNDO: ${{ secrets.CH_MUNDO }}
          CH_FINANZAS: ${{ secrets.CH_FINANZAS }}
          CH_FITNESS: ${{ secrets.CH_FITNESS }}
          CH_TECNOLOGIA: ${{ secrets.CH_TECNOLOGIA }}
        run: python bot_multicanal.py
