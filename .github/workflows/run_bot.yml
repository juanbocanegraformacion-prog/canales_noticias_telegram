name: NewsBot_RPA

on:
  schedule:
    #- cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Instalación
        run: pip install feedparser psycopg2-binary requests beautifulsoup4 python-telegram-bot
      - name: Ejecución
        env:
          DB_URL: ${{ secrets.DB_URL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot_news.py
