name: NewsBot_RPA_Execution

on:
  schedule:
    # Se ejecuta cada hora (puedes cambiarlo a '*/30 * * * *' para cada 30 min)
   # - cron: '0 * * * *'
  workflow_dispatch: # Esto permite que lo actives manualmente desde GitHub o Streamlit

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar entorno de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ejecutar Bot de Noticias
        env:
          # Estas variables se toman de Settings > Secrets > Actions
          DB_URL: ${{ secrets.DB_URL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot_news.py
