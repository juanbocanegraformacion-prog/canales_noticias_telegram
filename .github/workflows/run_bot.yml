name: NewsBot_RPA_Multichannel

on:
  schedule:
    # Se ejecuta cada 4 horas (en el minuto 0)
    - cron: '0 */4 * * *'
  # Permite lanzar el bot manualmente desde la pestaña Actions en GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Actualizado de @v4 a la versión más reciente compatible nativamente con Node 24
      - name: Checkout del código
        uses: actions/checkout@v4.2.2

      # Actualizado de @v5 a la versión nativa para entornos modernos
      - name: Configurar Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.10'
          cache: 'pip'

       Tarifa de instalación de dependencias limpia
      - name: Instalar dependencias
        run: |
          pip install feedparser requests beautifulsoup4 python-telegram-bot supabase

      - name: Ejecutar Bot Multicanal
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CH_DEPORTES: ${{ secrets.CH_DEPORTES }}
          CH_ENTRETENIMIENTO: ${{ secrets.CH_ENTRETENIMIENTO }}
          CH_MUNDO: ${{ secrets.CH_MUNDO }}
          CH_FINANZAS: ${{ secrets.CH_FINANZAS }}
          CH_FITNESS: ${{ secrets.CH_FITNESS }}
          CH_TECNOLOGIA: ${{ secrets.CH_TECNOLOGIA }}
        run: python bot_multicanal.py
