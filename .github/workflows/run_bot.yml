name: NewsBot_RPA_Multichannel

on:
  schedule:
    # Se ejecuta cada hora (minuto 0)
    - cron: '0 * * * *'
  # Habilita la ejecución manual desde la interfaz de GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Se eliminó la sección 'env' global que forzaba Node 24 para limpiar el log
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Mantiene la instalación de dependencias optimizada

      - name: Instalar dependencias
        run: |
          pip install feedparser requests beautifulsoup4 python-telegram-bot supabase

      - name: Ejecutar Bot Multicanal
        env:
          # Conexión Supabase
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          
          # Telegram y Canales
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CH_DEPORTES: ${{ secrets.CH_DEPORTES }}
          CH_ENTRETENIMIENTO: ${{ secrets.CH_ENTRETENIMIENTO }}
          CH_MUNDO: ${{ secrets.CH_MUNDO }}
          CH_FINANZAS: ${{ secrets.CH_FINANZAS }}
          CH_FITNESS: ${{ secrets.CH_FITNESS }}
          CH_TECNOLOGIA: ${{ secrets.CH_TECNOLOGIA }}
        run: python bot_multicanal.py
